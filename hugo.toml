  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "博客"
    url = "/posts/"
    weight = 2

  [[menu.main]]
  name = "文章分类"
  url = "/categories/"
  weight = 3


    [[menu.main]]
  name = "搜索"
  url = "/search/"
  weight = 4

  [[menu.main]]
    name = "联系我"
    url = "/about/"
