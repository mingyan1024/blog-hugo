baseURL = 'https://gaomian.org'
languageCode = 'zh-cn'
title = '高勉的技术分享 | 专注分享ai及其它IT领域的干货'
theme = "PaperMod"
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params.profileMode]
  enabled = true
  title = "您好，欢迎来到高勉的技术分享 👋" 
  subtitle  = "<br>本网站致力于分享有价值的IT信息和技术思考，专注于记录 ai、 Web 开发、app开发及其它IT领域的干货。<br><br><br>您可以点击导航栏的博客进行浏览，也可以在文章分类处找到喜欢的文章，或者在搜索栏找到关键词对应的文章"

[pagination]
  pagerSize = 5


[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  author = "高勉"
  description = "高勉的技术博客，专注分享 AI、Web 开发、App 开发领域的实用教程与技术思考，帮助开发者少走弯路。"
  ShowToc = true
  assets.favicon = "/favicon.ico"

[author]
  name = "高勉"

